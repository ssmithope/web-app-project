<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smith's Web Portfolio - Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body>
  <header>
    <div class="logo">Smith's Web Portfolio</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
      <button id="themeToggle" class="theme-toggle">Toggle Theme</button>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Contact Me</h1>
      <p>Have feedback or questions about this project? Send me a message.</p>
    </section>

    <section class="content-section">
      <form id="contactForm" class="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name<span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="Your name">
          <small class="error-message" id="nameError"></small>
        </div>

        <div class="form-group">
          <label for="email">Email<span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="you@example.com">
          <small class="error-message" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="message">Message<span class="required">*</span></label>
          <textarea id="message" name="message" rows="4" placeholder="Your message"></textarea>
          <small class="error-message" id="messageError"></small>
        </div>

        <button type="submit" class="btn-primary">Send Message</button>
        <p id="formSuccess" class="success-message"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Smith Eutrope Zephirin · CSE 310 – Web Apps Module</p>
  </footer>
</body>
</html>
